<div class="profile-container">
	<h2>Student Profile</h2>
	<div class="profile-field">
		<label>Name:</label>
		<span>{{ student().name }}</span>
	</div>
	<div class="profile-field">
		<label>Email:</label>
		<span>{{ student().email }}</span>
	</div>
	<div class="profile-field">
		<label>Course:</label>
		<span>{{ student().course }}</span>
	</div>
</div>
