<div class="course-create-container">
	<h2>Create New Course</h2>
	<form (ngSubmit)="onSubmit()" #courseForm="ngForm">
		<div class="form-field">
			<label for="courseName">Course Name</label>
			<input id="courseName" name="courseName" [(ngModel)]="courseName()" required />
		</div>
		<div class="form-field">
			<label for="description">Description</label>
			<textarea id="description" name="description" [(ngModel)]="description()" required></textarea>
		</div>
		<div class="form-field">
			<label for="category">Category</label>
			<input id="category" name="category" [(ngModel)]="category()" required />
		</div>
		<button type="submit">Create Course</button>
	</form>
	<div *ngIf="submitted()" class="success-message">
		<p>Course created successfully!</p>
	</div>
</div>
