<div class="user-create-container">
	<h2>Create New User</h2>
	<form [formGroup]="userForm" (ngSubmit)="onSubmit()" novalidate>
		<div class="form-field">
			<label for="name">Name</label>
			<input id="name" type="text" formControlName="name" required aria-required="true" [attr.aria-invalid]="name?.invalid && (name?.touched || submitted())" />
			<div *ngIf="name?.invalid && (name?.touched || submitted())" class="error">
				<span *ngIf="name?.errors?.['required']">Name is required.</span>
				<span *ngIf="name?.errors?.['minlength']">Name must be at least 2 characters.</span>
			</div>
		</div>
		<div class="form-field">
			<label for="email">Email</label>
			<input id="email" type="email" formControlName="email" required aria-required="true" [attr.aria-invalid]="email?.invalid && (email?.touched || submitted())" />
			<div *ngIf="email?.invalid && (email?.touched || submitted())" class="error">
				<span *ngIf="email?.errors?.['required']">Email is required.</span>
				<span *ngIf="email?.errors?.['email']">Enter a valid email address.</span>
			</div>
		</div>
		<div class="form-field">
			<label for="role">Role</label>
			<select id="role" formControlName="role" required aria-required="true">
				<option value="student">Student</option>
				<option value="manager">Manager</option>
				<option value="provider">Provider</option>
			</select>
			<div *ngIf="role?.invalid && (role?.touched || submitted())" class="error">
				<span *ngIf="role?.errors?.['required']">Role is required.</span>
			</div>
		</div>
		<button type="submit" [disabled]="loading()">{{ loading() ? 'Creating...' : 'Create User' }}</button>
	</form>
	<div *ngIf="success()" class="success-message">
		<p>User created successfully!</p>
	</div>
	<div *ngIf="error()" class="error-message">
		<p>{{ error() }}</p>
	</div>
</div>
